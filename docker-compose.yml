services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gitit
      POSTGRES_USER: gitit
      POSTGRES_PASSWORD: gitit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://gitit:gitit@db:5432/gitit
    depends_on:
      - db

volumes:
  pgdata:
