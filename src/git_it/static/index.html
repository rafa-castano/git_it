<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git It — Repository Insights</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2d3148;
      --accent: #6366f1; --text: #e2e8f0; --muted: #64748b;
      --green: #22c55e; --yellow: #eab308; --red: #ef4444;
      --blue: #3b82f6; --orange: #f97316; --purple: #a855f7;
    }
    body { font-family: 'Inter', system-ui, sans-serif; font-size: 14px; color: var(--text); background: var(--bg); height: 100vh; display: flex; flex-direction: column; }
    header { background: var(--surface); padding: 0 1.5rem; height: 52px; display: flex; align-items: center; gap: 1rem; flex-shrink: 0; border-bottom: 2px solid var(--accent); }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.05em; white-space: nowrap; }
    #repo-select { margin-left: auto; padding: 0.35rem 0.7rem; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); font-size: 13px; min-width: 260px; cursor: pointer; font-family: inherit; }
    #repo-subheader { background: #12151f; border-bottom: 1px solid var(--border); padding: 0.45rem 1.5rem; display: none; align-items: center; gap: 1rem; font-size: 12px; color: var(--muted); flex-shrink: 0; flex-wrap: wrap; }
    #repo-subheader a { color: var(--accent); text-decoration: none; font-weight: 500; }
    #repo-subheader a:hover { text-decoration: underline; }
    #repo-subheader .sh-sep { color: var(--border); }
    #repo-subheader .sh-badge { background: var(--border); color: var(--text); padding: 0.15rem 0.5rem; border-radius: 4px; font-weight: 600; font-size: 11px; }
    #repo-subheader .sh-status { background: #052e16; color: var(--green); padding: 0.15rem 0.5rem; border-radius: 4px; font-weight: 700; font-size: 11px; text-transform: uppercase; }
    .layout { display: flex; flex: 1; overflow: hidden; }
    aside { width: 220px; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
    aside h2 { padding: 0.9rem 1rem 0.5rem; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); border-bottom: 1px solid var(--border); }
    .repo-item { padding: 0.6rem 1rem; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.12s; font-size: 12px; color: var(--text); }
    .repo-item:hover { background: var(--border); }
    .repo-item.active { background: var(--accent); color: #fff; }
    .repo-item .repo-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .repo-item .repo-meta { font-size: 11px; opacity: 0.75; margin-top: 2px; }
    main { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); flex-shrink: 0; }
    .tab-btn { padding: 0.55rem 1.2rem; border: none; background: none; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; font-family: inherit; }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn:hover:not(.active) { color: var(--text); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Loading spinner */
    .loading-spinner { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1rem; gap: 1rem; color: var(--muted); font-size: 13px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Stat cards */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; margin-bottom: 1.25rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; }
    .stat-card .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.35rem; }
    .stat-card .stat-value { font-size: 2.5rem; font-weight: 800; color: var(--accent); line-height: 1; }
    .stat-card .stat-sub { font-size: 11px; color: var(--muted); margin-top: 0.25rem; }

    /* DNA card */
    .dna-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .dna-card h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.75rem; }
    .dna-pills { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .dna-pill { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.3rem 0.75rem; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1px solid transparent; }
    .dna-pill.blue   { background: #1e3a5f; color: #93c5fd; border-color: #1e40af; }
    .dna-pill.red    { background: #3b0e0e; color: #fca5a5; border-color: #7f1d1d; }
    .dna-pill.orange { background: #3d1f00; color: #fdba74; border-color: #7c2d12; }
    .dna-pill.green  { background: #052e16; color: #86efac; border-color: #14532d; }
    .dna-pill.purple { background: #2e1065; color: #d8b4fe; border-color: #4c1d95; }
    .dna-pill.gray   { background: #1c1c1c; color: #9ca3af; border-color: #374151; }

    /* Charts */
    .charts-row { display: grid; grid-template-columns: 1fr 2fr; gap: 1rem; margin-bottom: 1rem; }
    .chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
    .chart-box h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.75rem; }
    .chart-container { position: relative; }
    .chart-legend { display: flex; gap: 1rem; margin-top: 0.5rem; font-size: 11px; color: var(--muted); }
    .chart-legend-item { display: flex; align-items: center; gap: 0.3rem; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* Meta chips */
    .meta-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
    .chip { display: inline-flex; align-items: center; padding: 0.25rem 0.65rem; border-radius: 12px; font-size: 11px; font-weight: 600; background: var(--border); color: var(--accent); }
    .chip.gray { background: var(--surface); color: var(--muted); }

    /* Case Study */
    .case-study-header { margin-bottom: 1.25rem; }
    .case-study-title { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.5rem; color: var(--text); }
    .case-study-meta { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin-bottom: 0.75rem; }
    .case-study-meta a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .case-study-meta a:hover { text-decoration: underline; }
    .markdown-body { line-height: 1.7; max-width: 820px; color: var(--text); }
    .markdown-body h1 { font-size: 1.4rem; font-weight: 700; margin: 1.4rem 0 0.5rem; border-left: 4px solid var(--accent); padding-left: 0.75rem; }
    .markdown-body h2 { font-size: 1.25rem; font-weight: 600; color: var(--accent); margin: 1.2rem 0 0.5rem; border-left: 3px solid var(--accent); padding-left: 0.6rem; }
    .markdown-body h3 { font-size: 1rem; font-weight: 600; margin: 1rem 0 0.4rem; color: var(--text); }
    .markdown-body p { margin-bottom: 0.8rem; }
    .markdown-body ul, .markdown-body ol { margin: 0.5rem 0 0.8rem 1.5rem; }
    .markdown-body li { margin-bottom: 0.3rem; }
    .markdown-body li::marker { color: var(--accent); }
    .markdown-body code { background: var(--border); padding: 0.1em 0.35em; border-radius: 3px; font-family: monospace; font-size: 12px; }
    .markdown-body pre { background: var(--bg); color: var(--text); padding: 1rem; border-radius: 6px; overflow-x: auto; margin-bottom: 1rem; border: 1px solid var(--border); }
    .markdown-body pre code { background: none; color: inherit; }
    .markdown-body blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; color: var(--muted); margin: 0.8rem 0; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--surface); border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
    thead tr { background: var(--bg); }
    th { padding: 0.6rem 0.8rem; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    td { padding: 0.55rem 0.8rem; border-bottom: 1px solid var(--border); color: var(--text); }
    tr:hover td { background: var(--border); }
    tr:last-child td { border-bottom: none; }

    /* Badges */
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    .badge-feature  { background: #ef4444; color: #fff; }
    .badge-bugfix   { background: #3b82f6; color: #fff; }
    .badge-refactor { background: #f97316; color: #fff; }
    .badge-test     { background: #22c55e; color: #fff; }
    .badge-docs     { background: #a855f7; color: #fff; }
    .badge-build    { background: #6b7280; color: #fff; }
    .badge-security { background: #dc2626; color: #fff; }
    .badge-chore    { background: #6b7280; color: #fff; }
    .badge-unknown  { background: #374151; color: #9ca3af; }
    .badge-default  { background: #374151; color: #9ca3af; }

    /* Patterns sections */
    .section-heading { font-size: 13px; font-weight: 700; color: var(--muted); margin: 1.2rem 0 0.6rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .signal-cards-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
    .signal-card { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 8px; padding: 1rem; }
    .signal-card .sc-icon { font-size: 1.5rem; margin-bottom: 0.4rem; }
    .signal-card .sc-name { font-size: 13px; font-weight: 700; color: var(--text); }
    .signal-card .sc-count { font-size: 2rem; font-weight: 800; color: var(--accent); line-height: 1.1; margin: 0.2rem 0; }
    .signal-card .sc-desc { font-size: 12px; color: var(--muted); }
    .migration-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 0.4rem; font-size: 13px; }
    .migration-row .from-dep, .migration-row .to-dep { font-weight: 600; color: var(--text); }
    .migration-row .arrow { color: var(--accent); font-weight: 700; }
    .migration-row .m-count { background: var(--accent); color: #fff; border-radius: 10px; padding: 0.1rem 0.45rem; font-size: 11px; font-weight: 700; margin-left: auto; }
    .migration-row .m-conf { color: var(--muted); font-size: 11px; }
    .arch-item { display: flex; align-items: flex-start; gap: 0.5rem; padding: 0.6rem 0.8rem; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 0.5rem; font-size: 13px; }
    .arch-icon { font-size: 16px; flex-shrink: 0; }
    .insight-card { border-left: 4px solid var(--yellow); background: var(--surface); border-radius: 0 6px 6px 0; padding: 0.8rem 1rem; margin-bottom: 0.75rem; border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .insight-card .insight-title { font-weight: 700; font-size: 13px; margin-bottom: 0.4rem; color: var(--text); }
    .insight-card .insight-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: 0.06em; margin-top: 0.5rem; }
    .insight-card p { font-size: 13px; color: var(--muted); margin-top: 0.2rem; }

    /* Commits */
    .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
    .filter-bar select, .filter-bar input { padding: 0.35rem 0.6rem; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); color: var(--text); font-size: 13px; font-family: inherit; }
    .filter-bar input { flex: 1; min-width: 180px; }
    #load-more-btn { margin-top: 1rem; padding: 0.5rem 1.5rem; background: var(--accent); color: #fff; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; font-family: inherit; }
    #load-more-btn:hover { background: #4f46e5; }
    #load-more-btn:disabled { background: var(--muted); cursor: default; }
    .expand-row { display: none; }
    .expand-row.open { display: table-row; }
    .expand-cell { background: var(--bg); color: var(--muted); font-size: 12px; padding: 0.5rem 0.8rem 0.75rem 2rem; white-space: pre-wrap; border-bottom: 1px solid var(--border); }
    tr.clickable-row { cursor: pointer; }

    /* Utils */
    .empty-state { text-align: center; color: var(--muted); padding: 3rem 1rem; font-size: 13px; }
    #empty-banner { display: flex; align-items: center; justify-content: center; height: 100%; }
    .sha-code { font-family: monospace; font-size: 12px; color: var(--muted); }
    .date-cell { white-space: nowrap; color: var(--muted); font-size: 12px; }
    .summary-cell { max-width: 420px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>

<header>
  <h1>&#x1F50E; Git It</h1>
  <select id="repo-select">
    <option value="">— select a repository —</option>
  </select>
</header>

<div id="repo-subheader">
  <a id="sh-url" href="#" target="_blank" rel="noopener"></a>
  <span class="sh-sep">·</span>
  <span id="sh-commits" class="sh-badge"></span>
  <span class="sh-sep">·</span>
  <span id="sh-status" class="sh-status"></span>
  <span class="sh-sep">·</span>
  <span id="sh-analyzed" style="color:var(--muted)"></span>
</div>

<div class="layout">
  <aside>
    <h2>Repositories</h2>
    <div id="sidebar-list"></div>
  </aside>

  <main id="main-area">
    <div id="empty-banner">
      <div class="empty-state">
        <p>Select a repository from the sidebar to explore its overview, case study, patterns, and commits.</p>
      </div>
    </div>

    <div id="repo-content" style="display:none; flex-direction:column; gap:1rem;">
      <div class="tabs">
        <button class="tab-btn active" data-tab="overview">Overview</button>
        <button class="tab-btn" data-tab="case-study">Case Study</button>
        <button class="tab-btn" data-tab="patterns">Patterns</button>
        <button class="tab-btn" data-tab="commits">Commits</button>
      </div>

      <div class="tab-panel active" id="tab-overview"><div id="overview-content"></div></div>
      <div class="tab-panel" id="tab-case-study"><div id="case-study-content"></div></div>
      <div class="tab-panel" id="tab-patterns"><div id="patterns-content"></div></div>
      <div class="tab-panel" id="tab-commits">
        <div class="filter-bar">
          <select id="cat-filter">
            <option value="">All categories</option>
            <option value="FEATURE">FEATURE</option>
            <option value="BUGFIX">BUGFIX</option>
            <option value="REFACTOR">REFACTOR</option>
            <option value="BUILD">BUILD</option>
            <option value="DOCS">DOCS</option>
            <option value="TEST">TEST</option>
            <option value="OTHER">OTHER</option>
          </select>
          <input type="text" id="keyword-filter" placeholder="Search commits…">
        </div>
        <div id="commits-content"></div>
        <button id="load-more-btn" style="display:none">Load more</button>
      </div>
    </div>
  </main>
</div>

<script>
/* =========================================================
   State
   ========================================================= */
let currentRepo = null;
let currentRepoMeta = null;  // { canonical_url, commit_count, status, analysis_count }
let commitsLimit = 20;
let allCommits = [];
let patternsData = null;

/* =========================================================
   Chart registry
   ========================================================= */
const _charts = {};
function destroyChart(id) {
  if (_charts[id]) { _charts[id].destroy(); delete _charts[id]; }
}

/* =========================================================
   Category config
   ========================================================= */
const CAT_COLORS = {
  FEATURE: '#3b82f6', BUGFIX: '#ef4444', REFACTOR: '#f97316',
  BUILD: '#6b7280', DOCS: '#a855f7', TEST: '#22c55e',
  SECURITY: '#dc2626', PERFORMANCE: '#06b6d4', CHORE: '#6b7280',
  UNKNOWN: '#374151', OTHER: '#64748b',
};
function catColor(cat) { return CAT_COLORS[(cat || '').toUpperCase()] || '#64748b'; }
function badgeClass(category) {
  if (!category) return 'badge-default';
  const c = category.toLowerCase();
  if (c === 'feature' || c === 'feat') return 'badge-feature';
  if (c === 'bugfix' || c === 'bug' || c === 'fix') return 'badge-bugfix';
  if (c === 'refactor') return 'badge-refactor';
  if (c === 'test') return 'badge-test';
  if (c === 'docs') return 'badge-docs';
  if (c === 'security') return 'badge-security';
  if (c === 'build' || c === 'chore' || c === 'ci') return 'badge-chore';
  if (c === 'unknown') return 'badge-unknown';
  return 'badge-default';
}

/* =========================================================
   Utilities
   ========================================================= */
function fmtDate(iso) { if (!iso) return '—'; try { return iso.slice(0, 10); } catch { return iso; } }
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function truncate(str, n) { if (!str) return ''; return str.length > n ? str.slice(0, n) + '…' : str; }
function repoShortName(url) {
  try { const p = url.replace(/\.git$/, '').split('/'); return p.slice(-2).join('/'); }
  catch { return url; }
}
function spinner() {
  return '<div class="loading-spinner"><div class="spinner"></div><p>Loading repository data…</p></div>';
}
async function apiFetch(url) {
  const res = await fetch(url);
  if (!res.ok) throw { status: res.status, body: await res.text() };
  return res.json();
}

/* =========================================================
   Best granularity for activity chart
   ========================================================= */
function bestGranularity(commits) {
  const dates = commits.map(c => (c.committed_at || '').slice(0, 10)).filter(Boolean);
  const unique = new Set(dates);
  if (unique.size <= 1) return 'hour';
  const months = new Set(commits.map(c => (c.committed_at || '').slice(0, 7)).filter(Boolean));
  if (months.size <= 2) return 'day';
  return 'month';
}

function buildActivityData(commits) {
  const g = bestGranularity(commits);
  const map = {};
  commits.forEach(c => {
    if (!c.committed_at) return;
    let key;
    if (g === 'hour') key = c.committed_at.slice(0, 13).replace('T', ' ') + 'h';
    else if (g === 'day') key = c.committed_at.slice(0, 10);
    else key = c.committed_at.slice(0, 7);
    map[key] = (map[key] || 0) + 1;
  });
  const labels = Object.keys(map).sort();
  return { labels, data: labels.map(k => map[k]), granularity: g };
}

/* =========================================================
   Sidebar and selector
   ========================================================= */
let reposCache = [];
async function loadRepos() {
  let data;
  try { data = await apiFetch('/api/repos'); }
  catch {
    document.getElementById('sidebar-list').innerHTML = '<div class="empty-state">Could not load repositories.</div>';
    return;
  }
  reposCache = data.repos || [];
  const select = document.getElementById('repo-select');
  const sidebar = document.getElementById('sidebar-list');
  if (reposCache.length === 0) {
    sidebar.innerHTML = '<div class="empty-state">No repositories found.</div>';
    return;
  }
  reposCache.forEach(repo => {
    const short = repoShortName(repo.canonical_url);
    const item = document.createElement('div');
    item.className = 'repo-item';
    item.dataset.id = repo.repository_id;
    item.innerHTML = `<div class="repo-name">${esc(short)}</div><div class="repo-meta">${repo.commit_count} commits · ${repo.status}</div>`;
    item.addEventListener('click', () => selectRepo(repo.repository_id, item));
    sidebar.appendChild(item);
    const opt = document.createElement('option');
    opt.value = repo.repository_id;
    opt.textContent = short;
    select.appendChild(opt);
  });
}

/* =========================================================
   Repo selection
   ========================================================= */
function selectRepo(repoId, sidebarItem) {
  if (currentRepo === repoId) return;
  currentRepo = repoId;
  commitsLimit = 20;
  allCommits = [];
  patternsData = null;
  currentRepoMeta = reposCache.find(r => r.repository_id === repoId) || null;

  document.querySelectorAll('.repo-item').forEach(el => el.classList.remove('active'));
  if (sidebarItem) sidebarItem.classList.add('active');
  document.getElementById('repo-select').value = repoId;

  // Update sub-header
  const sh = document.getElementById('repo-subheader');
  sh.style.display = 'flex';
  if (currentRepoMeta) {
    const urlEl = document.getElementById('sh-url');
    urlEl.href = currentRepoMeta.canonical_url;
    urlEl.textContent = repoShortName(currentRepoMeta.canonical_url) + ' ↗';
    document.getElementById('sh-commits').textContent = currentRepoMeta.commit_count + ' commits';
    document.getElementById('sh-status').textContent = currentRepoMeta.status;
    document.getElementById('sh-analyzed').textContent = currentRepoMeta.analysis_count + ' analyzed';
  }

  document.getElementById('empty-banner').style.display = 'none';
  const content = document.getElementById('repo-content');
  content.style.display = 'flex';
  switchTab('overview');

  loadOverview(repoId);
  loadCaseStudy(repoId);
  loadPatterns(repoId);
  loadCommits(repoId, false);
}

document.getElementById('repo-select').addEventListener('change', function() {
  if (!this.value) return;
  const item = document.querySelector(`.repo-item[data-id="${this.value}"]`);
  selectRepo(this.value, item);
});

/* =========================================================
   Tabs
   ========================================================= */
function switchTab(tabName) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabName));
  document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.toggle('active', panel.id === 'tab-' + tabName));
}
document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));

/* =========================================================
   Overview
   ========================================================= */
async function loadOverview(repoId) {
  const el = document.getElementById('overview-content');
  el.innerHTML = spinner();

  let patterns, commits, caseStudy;
  try {
    [patterns, commits] = await Promise.all([
      apiFetch(`/api/repos/${encodeURIComponent(repoId)}/patterns`),
      apiFetch(`/api/repos/${encodeURIComponent(repoId)}/commits?limit=500&order=newest`),
    ]);
    try { caseStudy = await apiFetch(`/api/repos/${encodeURIComponent(repoId)}/case-study`); }
    catch { caseStudy = null; }
  } catch {
    el.innerHTML = '<div class="empty-state">Error loading overview data.</div>';
    return;
  }

  const totalCommits = commits.total || (commits.commits || []).length;
  const hotspotCount = (patterns.hotspots || []).length;
  const patternCount = [
    patterns.refactor_wave, patterns.revert_signal, patterns.test_growth_signal,
    ...(patterns.dependency_migrations || []), ...(patterns.architectural_shifts || []),
  ].filter(Boolean).length;
  const catCounts = patterns.category_counts || [];
  const totalCat = catCounts.reduce((s, c) => s + c.count, 0);
  const bugfixCount = (catCounts.find(c => c.category.toLowerCase() === 'bugfix') || {}).count || 0;
  const featureCount = (catCounts.find(c => c.category.toLowerCase() === 'feature') || {}).count || 0;

  // DNA pills
  const pills = [];
  pills.push(`<span class="dna-pill blue">⚡ ${totalCommits} commits</span>`);
  if (totalCat > 0 && bugfixCount / totalCat > 0.30) pills.push('<span class="dna-pill red">🐛 High bug-fix rate</span>');
  if (totalCat > 0 && featureCount / totalCat > 0.40) pills.push('<span class="dna-pill blue">🚀 Feature-heavy</span>');
  if (hotspotCount > 200) pills.push('<span class="dna-pill orange">🔥 High churn</span>');
  else if (hotspotCount > 0) pills.push(`<span class="dna-pill orange">🔥 ${hotspotCount} hotspot files</span>`);
  if (currentRepoMeta && currentRepoMeta.analysis_count > 0) pills.push(`<span class="dna-pill purple">📦 ${currentRepoMeta.analysis_count} analyzed</span>`);
  if (caseStudy) pills.push('<span class="dna-pill green">✅ Case study ready</span>');

  el.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Commits</div><div class="stat-value">${totalCommits}</div></div>
      <div class="stat-card"><div class="stat-label">Hotspot Files</div><div class="stat-value">${hotspotCount}</div></div>
      <div class="stat-card"><div class="stat-label">Patterns</div><div class="stat-value">${patternCount}</div></div>
      <div class="stat-card">
        <div class="stat-label">Case Study</div>
        <div class="stat-value" style="font-size:1.6rem">${caseStudy ? '✓' : '✗'}</div>
        <div class="stat-sub">${caseStudy ? 'Available' : 'Not generated'}</div>
      </div>
    </div>
    <div class="charts-row">
      <div class="chart-box">
        <h3>Commit Categories</h3>
        <div class="chart-container" style="height:220px"><canvas id="chart-donut"></canvas></div>
      </div>
      <div class="chart-box">
        <h3>Commit Activity</h3>
        <div class="chart-container" style="height:220px"><canvas id="chart-activity"></canvas></div>
      </div>
    </div>
    <div class="chart-box" style="margin-bottom:1rem">
      <h3>Top Hotspot Files</h3>
      <div class="chart-container" style="height:${Math.max(120, Math.min((patterns.hotspots || []).slice(0,5).length, 5) * 36)}px">
        <canvas id="chart-hotspots"></canvas>
      </div>
    </div>
    <div class="dna-card">
      <h3>Repository DNA</h3>
      <div class="dna-pills">${pills.join('')}</div>
    </div>
  `;

  // Donut chart
  if (catCounts.length > 0) {
    destroyChart('donut');
    _charts['donut'] = new Chart(document.getElementById('chart-donut'), {
      type: 'doughnut',
      data: {
        labels: catCounts.map(c => c.category),
        datasets: [{ data: catCounts.map(c => c.count), backgroundColor: catCounts.map(c => catColor(c.category)), borderWidth: 1, borderColor: '#0f1117' }],
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#e2e8f0', font: { size: 11 } } } } },
    });
  } else {
    document.getElementById('chart-donut').parentElement.innerHTML = '<div class="empty-state" style="padding:1rem">No category data</div>';
  }

  // Activity chart — auto-detect granularity
  const commitList = commits.commits || [];
  const { labels: actLabels, data: actData } = buildActivityData(commitList);
  if (actLabels.length > 0) {
    destroyChart('activity');
    _charts['activity'] = new Chart(document.getElementById('chart-activity'), {
      type: 'bar',
      data: { labels: actLabels, datasets: [{ label: 'Commits', data: actData, backgroundColor: '#6366f1', borderRadius: 3 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#64748b', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#2d3148' } },
          y: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#2d3148' } },
        },
      },
    });
  }

  // Hotspot chart
  const top5 = (patterns.hotspots || []).slice(0, 5);
  if (top5.length > 0) {
    destroyChart('hotspots');
    _charts['hotspots'] = new Chart(document.getElementById('chart-hotspots'), {
      type: 'bar',
      data: {
        labels: top5.map(h => h.file_path.split('/').pop()),
        datasets: [{ label: 'Commits', data: top5.map(h => h.commit_count), backgroundColor: top5.map(h => { const c = h.confidence||0; return c>=0.7?'#ef4444':c>=0.4?'#eab308':'#22c55e'; }), borderRadius: 3 }],
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#2d3148' } },
          y: { ticks: { color: '#e2e8f0', font: { size: 11 } }, grid: { display: false } },
        },
      },
    });
  } else {
    document.getElementById('chart-hotspots').parentElement.innerHTML = '<div class="empty-state" style="padding:1rem">No hotspot data</div>';
  }
}

/* =========================================================
   Case Study
   ========================================================= */
async function loadCaseStudy(repoId) {
  const el = document.getElementById('case-study-content');
  el.innerHTML = spinner();
  let data;
  try { data = await apiFetch(`/api/repos/${encodeURIComponent(repoId)}/case-study`); }
  catch (e) {
    el.innerHTML = e.status === 404
      ? '<div class="empty-state">No case study generated yet for this repository.</div>'
      : '<div class="empty-state">Error loading case study.</div>';
    return;
  }

  const canonicalUrl = currentRepoMeta ? currentRepoMeta.canonical_url : data.repository_id;
  const words = (data.narrative || '').trim().split(/\s+/).length;
  const readMin = Math.ceil(words / 200);

  const chips = `<div class="meta-chips">
    <span class="chip">${data.commit_count} commits</span>
    <span class="chip">${data.hotspot_count} hotspots</span>
    <span class="chip gray">~${readMin} min read · ${words} words</span>
    ${data.generated_at ? `<span class="chip gray">Generated ${fmtDate(data.generated_at)}</span>` : ''}
  </div>`;

  const narrative = typeof marked !== 'undefined'
    ? marked.parse(data.narrative || '')
    : '<pre>' + esc(data.narrative || '') + '</pre>';

  el.innerHTML = `
    <div class="case-study-header">
      <div class="case-study-title">${esc(repoShortName(canonicalUrl))}</div>
      <div class="case-study-meta">
        <a href="${esc(canonicalUrl)}" target="_blank" rel="noopener">${esc(canonicalUrl)} ↗</a>
      </div>
      ${chips}
    </div>
    <div class="markdown-body">${narrative}</div>
  `;
}

/* =========================================================
   Patterns
   ========================================================= */
async function loadPatterns(repoId) {
  const el = document.getElementById('patterns-content');
  el.innerHTML = spinner();
  let data;
  try { data = await apiFetch(`/api/repos/${encodeURIComponent(repoId)}/patterns`); }
  catch { el.innerHTML = '<div class="empty-state">No pattern report available yet.</div>'; return; }

  patternsData = data;
  let html = '';

  // --- HOTSPOTS ---
  html += '<div class="section-heading">Hotspots</div>';
  if (data.hotspots && data.hotspots.length > 0) {
    const top10 = data.hotspots.slice(0, 10);
    html += `<div class="chart-box" style="margin-bottom:0.5rem">
      <div class="chart-container" style="height:${Math.max(120, top10.length * 32)}px">
        <canvas id="chart-hotspots-patterns"></canvas>
      </div>
      <div class="chart-legend">
        <span class="chart-legend-item"><span class="legend-dot" style="background:#ef4444"></span>High confidence (&gt;70%)</span>
        <span class="chart-legend-item"><span class="legend-dot" style="background:#eab308"></span>Medium (40–70%)</span>
        <span class="chart-legend-item"><span class="legend-dot" style="background:#22c55e"></span>Low (&lt;40%)</span>
      </div>
    </div>`;
    html += `<details style="margin-bottom:1rem">
      <summary style="cursor:pointer;font-size:13px;color:var(--muted);padding:0.4rem 0">Evidence table (${data.hotspots.length} files)</summary>
      <table style="margin-top:0.5rem">
        <thead><tr><th>File</th><th>Commits</th><th>Churn</th><th>Confidence</th><th>Period</th></tr></thead>
        <tbody>`;
    data.hotspots.forEach(h => {
      const period = h.time_range && h.time_range.length >= 2 ? `${fmtDate(h.time_range[0])} → ${fmtDate(h.time_range[1])}` : '—';
      const pct = h.confidence != null ? (h.confidence * 100).toFixed(0) + '%' : '—';
      html += `<tr><td><code style="font-size:11px">${esc(h.file_path)}</code></td><td>${h.commit_count}</td><td>${h.churn}</td><td>${pct}</td><td class="date-cell">${period}</td></tr>`;
    });
    html += '</tbody></table></details>';
  } else { html += '<div class="empty-state">No hotspots detected.</div>'; }

  // --- PATTERN SIGNALS ---
  const signalDefs = [];
  if (data.refactor_wave) signalDefs.push({ icon: '🔁', name: 'Refactor Wave', obj: data.refactor_wave, color: '#f97316', desc: (d) => `${d.commit_count||0} refactor commits · ${((d.ratio||0)*100).toFixed(1)}% of analyzed` });
  if (data.revert_signal) signalDefs.push({ icon: '↩️', name: 'Revert Signal', obj: data.revert_signal, color: '#ef4444', desc: (d) => `${d.commit_count||0} reverts · Indicates unstable periods` });
  if (data.test_growth_signal) signalDefs.push({ icon: '🧪', name: 'Test Growth', obj: data.test_growth_signal, color: '#22c55e', desc: (d) => `test:bug ratio ${(d.ratio||0).toFixed(2)} · Growing test coverage` });
  if (data.bugfix_recurrences && data.bugfix_recurrences.length > 0) signalDefs.push({ icon: '🐛', name: 'Bugfix Recurrences', obj: { count: data.bugfix_recurrences.length }, color: '#ef4444', desc: (d) => `${d.count} recurring bugs · Same areas keep breaking` });
  if (signalDefs.length > 0) {
    html += '<div class="section-heading">Pattern Signals</div><div class="signal-cards-row">';
    signalDefs.forEach(s => {
      const big = s.obj.commit_count != null ? s.obj.commit_count : (s.obj.count != null ? s.obj.count : ((s.obj.ratio||0)*100).toFixed(0)+'%');
      html += `<div class="signal-card" style="border-left-color:${s.color}">
        <div class="sc-icon">${s.icon}</div>
        <div class="sc-name">${esc(s.name)}</div>
        <div class="sc-count" style="color:${s.color}">${big}</div>
        <div class="sc-desc">${esc(s.desc(s.obj))}</div>
      </div>`;
    });
    html += '</div>';
  }

  // --- DEPENDENCY MIGRATIONS ---
  if (data.dependency_migrations && data.dependency_migrations.length > 0) {
    html += '<div class="section-heading">Dependency Migrations</div>';
    data.dependency_migrations.forEach(m => {
      const from = m.from_dependency || m.from_dep || m.from || '?';
      const to = m.to_dependency || m.to_dep || m.to || '?';
      const count = m.commit_count || m.commits || 0;
      const conf = m.confidence != null ? `confidence: ${(m.confidence*100).toFixed(0)}%` : '';
      html += `<div class="migration-row">
        <span class="from-dep">${esc(from)}</span>
        <span class="arrow">──→</span>
        <span class="to-dep">${esc(to)}</span>
        ${conf ? `<span class="m-conf">${esc(conf)}</span>` : ''}
        <span class="m-count">${count}</span>
      </div>`;
    });
  }

  // --- ARCHITECTURAL SHIFTS ---
  if (data.architectural_shifts && data.architectural_shifts.length > 0) {
    html += '<div class="section-heading">Architectural Shifts</div>';
    data.architectural_shifts.forEach(s => {
      const icon = s.shift_type === 'infrastructure' ? '🏗️' : '📦';
      const desc = s.description || JSON.stringify(s);
      const conf = s.confidence != null ? ` · ${(s.confidence * 100).toFixed(0)}% confidence` : '';
      html += `<div class="arch-item"><span class="arch-icon">${icon}</span><span>${esc(desc)}${esc(conf)}</span></div>`;
    });
  }

  // --- EDUCATIONAL INSIGHTS ---
  if (data.explanations && data.explanations.length > 0) {
    html += '<div class="section-heading">💡 Educational Insights</div>';
    data.explanations.forEach(ex => {
      html += `<div class="insight-card">
        <div class="insight-title">💡 ${esc(ex.pattern_type || ex.title || 'Insight')}</div>
        ${ex.why_it_matters ? `<div class="insight-label">Why it matters</div><p>${esc(ex.why_it_matters)}</p>` : ''}
        ${ex.engineer_takeaway ? `<div class="insight-label">Engineer takeaway</div><p><em>${esc(ex.engineer_takeaway)}</em></p>` : ''}
      </div>`;
    });
  }

  if (!html) html = '<div class="empty-state">No patterns detected yet.</div>';
  el.innerHTML = html;

  // Render chart after DOM update
  if (data.hotspots && data.hotspots.length > 0) {
    const top10 = data.hotspots.slice(0, 10);
    const canvas = document.getElementById('chart-hotspots-patterns');
    if (canvas) {
      destroyChart('hotspots-patterns');
      _charts['hotspots-patterns'] = new Chart(canvas, {
        type: 'bar',
        data: {
          labels: top10.map(h => h.file_path.split('/').pop()),
          datasets: [{ label: 'Commits', data: top10.map(h => h.commit_count), backgroundColor: top10.map(h => { const c=h.confidence||0; return c>=0.7?'#ef4444':c>=0.4?'#eab308':'#22c55e'; }), borderRadius: 3 }],
        },
        options: {
          indexAxis: 'y', responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#2d3148' } },
            y: { ticks: { color: '#e2e8f0', font: { size: 11 } }, grid: { display: false } },
          },
        },
      });
    }
  }
}

/* =========================================================
   Commits
   ========================================================= */
async function loadCommits(repoId, append) {
  const el = document.getElementById('commits-content');
  const btn = document.getElementById('load-more-btn');
  if (!append) { el.innerHTML = spinner(); btn.style.display = 'none'; allCommits = []; }
  let data;
  try { data = await apiFetch(`/api/repos/${encodeURIComponent(repoId)}/commits?limit=${commitsLimit}&order=newest`); }
  catch { el.innerHTML = '<div class="empty-state">Error loading commits.</div>'; return; }
  allCommits = data.commits || [];
  renderCommitsTable(allCommits, data.total);
}

function renderCommitsTable(commits, total) {
  const el = document.getElementById('commits-content');
  const btn = document.getElementById('load-more-btn');
  const catFilter = document.getElementById('cat-filter').value;
  const keyword = document.getElementById('keyword-filter').value.toLowerCase();
  let filtered = commits;
  if (catFilter) filtered = filtered.filter(c => (c.category || '').toUpperCase() === catFilter);
  if (keyword) filtered = filtered.filter(c => (c.message||'').toLowerCase().includes(keyword) || (c.summary||'').toLowerCase().includes(keyword) || (c.sha||'').toLowerCase().includes(keyword));
  if (filtered.length === 0) { el.innerHTML = '<div class="empty-state">No commits match the current filter.</div>'; btn.style.display = 'none'; return; }

  let rows = '';
  filtered.forEach((c, i) => {
    const sha7 = (c.sha || '').slice(0, 7);
    const cat = (c.category || '').toUpperCase();
    const bClass = badgeClass(c.category || '');
    const importance = c.importance ? `<span class="badge" style="background:#1e293b;color:${c.importance==='high'?'#ef4444':c.importance==='medium'?'#eab308':'#64748b'}">${esc(c.importance.toUpperCase())}</span>` : '';
    const summary = truncate(c.summary || c.message || '', 80);
    const expandId = `expand-${i}`;
    rows += `<tr class="clickable-row" onclick="toggleExpand('${expandId}')">
      <td><span class="sha-code">${esc(sha7)}</span></td>
      <td class="date-cell">${fmtDate(c.committed_at)}</td>
      <td>${cat ? `<span class="badge ${bClass}">${esc(cat)}</span>` : '—'} ${importance}</td>
      <td class="summary-cell" title="${esc(c.summary || c.message || '')}">${esc(summary)}</td>
    </tr>
    <tr class="expand-row" id="${expandId}">
      <td colspan="4" class="expand-cell">${esc(c.summary || c.message || '(no summary)')}</td>
    </tr>`;
  });

  el.innerHTML = `<table>
    <thead><tr><th>SHA</th><th>Date</th><th>Category</th><th>Summary</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;

  btn.style.display = commits.length >= commitsLimit ? 'inline-block' : 'none';
  btn.disabled = false;
}

function toggleExpand(id) { const r = document.getElementById(id); if (r) r.classList.toggle('open'); }

document.getElementById('cat-filter').addEventListener('change', () => renderCommitsTable(allCommits, allCommits.length));
document.getElementById('keyword-filter').addEventListener('input', () => renderCommitsTable(allCommits, allCommits.length));
document.getElementById('load-more-btn').addEventListener('click', function() {
  if (!currentRepo) return;
  commitsLimit += 20;
  this.disabled = true;
  this.textContent = 'Loading…';
  loadCommits(currentRepo, false).then(() => { this.textContent = 'Load more'; });
});

/* =========================================================
   Boot
   ========================================================= */
loadRepos();
</script>
