<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git It — Repository Insights</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>

<!-- ═══════════════════════════════ HEADER ═══════════════════════════════ -->
<header>
  <button class="hdr-logo" onclick="goHome()" aria-label="Go to home" style="background:none;border:none;cursor:pointer;font-family:inherit;color:inherit;font-size:1.05rem;font-weight:800;letter-spacing:.04em;white-space:nowrap;flex-shrink:0;padding:0">&#x1F50E; Git It</button>
  <div id="hdr-center">
    <div id="hdr-repo-info">
      <span class="hdr-sep" aria-hidden="true" style="color:var(--border)">/</span>
      <span id="hdr-repo-name"></span>
      <div class="hdr-meta">
        <span id="sh-commits" class="hdr-badge" tabindex="0" data-tip="shCommits"></span>
        <span id="sh-status" class="hdr-status" tabindex="0" data-tip="shStatus"></span>
        <span id="sh-analyzed" class="hdr-badge" tabindex="0" data-tip="shAnalyzed"></span>
        <button id="sh-analyze-btn" class="analyze-btn" onclick="_showAnalyzePicker()" aria-label="Analyze more commits" title="Analyze more commits">+ Analyze</button>
        <button id="sh-delete-btn" class="delete-btn" onclick="_confirmDeleteCurrentRepo()" aria-label="Delete this repository" title="Delete this repository" style="display:none">&#x1F5D1; Delete</button>
        <div id="sh-analyze-picker" style="display:none;align-items:center;gap:0.3rem;background:var(--surface);border:1px solid var(--accent);border-radius:6px;padding:0.2rem 0.4rem">
          <span style="font-size:10px;color:var(--muted);white-space:nowrap">How many commits?</span>
          <button class="analyze-btn" style="font-size:10px;padding:0.1rem 0.4rem" onclick="_doAnalyze(10)">10</button>
          <button class="analyze-btn" style="font-size:10px;padding:0.1rem 0.4rem" onclick="_doAnalyze(20)">20</button>
          <button class="analyze-btn" style="font-size:10px;padding:0.1rem 0.4rem" onclick="_doAnalyze(50)">50</button>
          <button class="analyze-btn" style="font-size:10px;padding:0.1rem 0.4rem" onclick="_doAnalyze(100)">100</button>
          <button class="analyze-btn" style="font-size:10px;padding:0.1rem 0.4rem" onclick="_doAnalyze(9999)">All</button>
          <button style="font-size:10px;background:none;border:none;color:var(--muted);cursor:pointer;padding:0 0.2rem" onclick="_hideAnalyzePicker()" aria-label="Cancel">✕</button>
        </div>
      </div>
      <a id="hdr-gh-link" class="gh-btn" href="#" target="_blank" rel="noopener" aria-label="View on GitHub">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        <span id="hdr-gh-text">GitHub</span>
      </a>
    </div>
  </div>
  <button id="btn-tips" class="hdr-btn active" aria-pressed="true" aria-label="Toggle tooltips" title="Toggle tooltips" style="display:none">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    Tooltips
  </button>
  <button id="btn-theme" class="hdr-btn" aria-label="Switch to light mode" title="Toggle light/dark mode">
    <svg id="icon-moon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg id="icon-sun" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <span id="theme-label">Dark</span>
  </button>
</header>

<!-- ═══════════════════════════════ HOME VIEW ═══════════════════════════ -->
<div id="home-view">
  <div class="home-inner">

    <div class="home-hero" aria-label="Git It — Repository intelligence">
      <h1>&#x1F50E; Understand any GitHub repository</h1>
      <p>Git It analyzes commit history with AI to surface patterns, hotspots, and a narrative case study of how your codebase evolved.</p>
    </div>

    <div class="add-repo-wrap">
      <div class="add-repo-card">
        <h3 id="ingest-heading">Analyze a repository</h3>
        <div class="add-repo-row">
          <input id="home-repo-input" class="add-repo-input" type="text"
            placeholder="https://github.com/owner/repo or owner/repo"
            aria-label="GitHub repository URL"
            aria-describedby="ingest-hint"
            onkeydown="if(event.key==='Enter') handleAddRepo()">
          <button id="ingest-btn" class="add-repo-btn" onclick="handleAddRepo()" aria-label="Analyze repository">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Analyze
          </button>
        </div>
        <p class="add-repo-hint" id="ingest-hint">Try: <code style="background:var(--border);padding:.1rem .35rem;border-radius:3px;font-family:monospace;font-size:11px">torvalds/linux</code> or a full GitHub URL</p>
        <div id="ingest-status" aria-live="polite" role="status"></div>
        <div id="search-results" role="listbox" aria-label="Matching repositories"></div>
      </div>
    </div>

    <div>
      <div class="repo-cards-label">
        <span>Previously analyzed</span>
        <span id="repos-count" style="color:var(--accent);font-weight:800" aria-live="polite"></span>
      </div>
      <div id="repo-cards-grid" class="repo-cards-grid" role="list" aria-label="Analyzed repositories" aria-live="polite"></div>
    </div>

  </div>
</div>

<!-- ═══════════════════════════════ REPO VIEW ═══════════════════════════ -->
<div id="repo-view">
  <div class="layout">
    <aside aria-label="Repository list">
      <div class="rv-back-row">
        <button class="rv-back-btn" onclick="goHome()" aria-label="Back to home">← All repos</button>
      </div>
      <h2 id="sidebar-heading">Repositories</h2>
      <div id="sidebar-list" role="list" aria-labelledby="sidebar-heading"></div>
    </aside>

    <main id="main-area">

      <!-- Timeline / Deep Analysis switcher -->
      <div class="view-nav" role="tablist" aria-label="Repository views">
        <button id="view-btn-timeline" class="view-nav-btn active" role="tab" aria-selected="true" aria-controls="panel-timeline">Timeline</button>
        <button id="view-btn-detail" class="view-nav-btn" role="tab" aria-selected="false" aria-controls="panel-detail">Deep Analysis</button>
      </div>

      <!-- ── Timeline panel ── -->
      <div id="panel-timeline" role="tabpanel" aria-labelledby="view-btn-timeline" tabindex="0">
        <div class="filter-bar" style="margin-bottom:0.5rem">
          <select id="tl-limit-select" aria-label="Number of commits to show" title="Number of commits to load" onchange="_applyTimelineFilters()">
            <option value="200" selected>All analyzed</option>
          </select>
          <input type="text" id="tl-search" placeholder="Filter timeline…" aria-label="Filter timeline by keyword, author, or SHA" onkeydown="if(event.key==='Enter')_applyTimelineFilters()">
          <input type="date" id="tl-date-from" aria-label="Filter from date" title="From date" onchange="_applyTimelineFilters()" style="padding:0.35rem 0.6rem;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;color-scheme:dark">
          <input type="date" id="tl-date-to" aria-label="Filter to date" title="To date" onchange="_applyTimelineFilters()" style="padding:0.35rem 0.6rem;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;color-scheme:dark">
        </div>
        <div id="timeline-content"></div>
      </div>

      <!-- ── Deep Analysis panel ── -->
      <div id="panel-detail" role="tabpanel" aria-labelledby="view-btn-detail" tabindex="0" style="display:none">
        <div id="repo-content" style="display:flex; flex-direction:column; gap:1rem;">
          <div class="tabs" role="tablist" aria-label="Repository views">
            <button class="tab-btn" data-tab="overview"      role="tab" aria-selected="true"  aria-controls="tab-overview"      id="tbtn-overview">Overview</button>
            <button class="tab-btn" data-tab="case-study"   role="tab" aria-selected="false" aria-controls="tab-case-study"   id="tbtn-case-study">Case Study</button>
            <button class="tab-btn" data-tab="commits"      role="tab" aria-selected="false" aria-controls="tab-commits"      id="tbtn-commits">Commits</button>
            <button class="tab-btn" data-tab="contributors" role="tab" aria-selected="false" aria-controls="tab-contributors" id="tbtn-contributors">Contributors</button>
          </div>

          <div class="tab-panel active" id="tab-overview"   role="tabpanel" aria-labelledby="tbtn-overview"   tabindex="0"><div id="overview-content"></div></div>
          <div class="tab-panel"        id="tab-case-study" role="tabpanel" aria-labelledby="tbtn-case-study" tabindex="0"><div id="case-study-content"></div></div>
          <div class="tab-panel"        id="tab-commits"    role="tabpanel" aria-labelledby="tbtn-commits"    tabindex="0">
            <div style="display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0 0.25rem;margin-bottom:0.25rem;border-bottom:1px solid var(--border)">
              <button class="hdr-btn" onclick="switchTab('overview')" aria-label="Go back to Overview">← Overview</button>
              <div id="commits-back-bar" style="display:none;align-items:center;gap:0.5rem">
                <button class="hdr-btn" onclick="_clearCommitFilters()" aria-label="Clear filter">Clear filter</button>
                <span id="commits-filter-desc" style="font-size:12px;color:var(--muted)"></span>
              </div>
            </div>
            <div class="filter-bar">
              <select id="cat-filter" aria-label="Filter commits by category">
                <option value="">All categories</option>
                <option value="FEATURE">FEATURE</option>
                <option value="BUGFIX">BUGFIX</option>
                <option value="REFACTOR">REFACTOR</option>
                <option value="BUILD">BUILD</option>
                <option value="DOCS">DOCS</option>
                <option value="TEST">TEST</option>
                <option value="OTHER">OTHER</option>
              </select>
              <input type="text" id="keyword-filter" placeholder="Search commits…" aria-label="Search commits by keyword, SHA, or summary">
            </div>
            <div id="commits-content" aria-live="polite"></div>
            <button id="load-more-btn" style="display:none" aria-label="Load more commits">Load more</button>
          </div>
          <div class="tab-panel" id="tab-contributors" role="tabpanel" aria-labelledby="tbtn-contributors" tabindex="0">
            <div id="contributors-content"></div>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<div id="global-tip" role="tooltip"></div>

<script src="/static/app.js"></script>
</body>
</html>
